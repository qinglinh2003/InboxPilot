# ── MailPilot nginx reverse proxy ─────────────────────
#
# Single entry point for both the frontend and the API:
#
#   https://localhost/              → static React app
#   https://localhost/api/*         → proxy to backend:8000
#
# This eliminates CORS entirely (same origin).
# ──────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name localhost;

    # ── TLS certificates ─────────────────────────────
    # Mount via docker-compose volumes.
    # Local dev: self-signed (see docker/generate-certs.sh)
    # Production: real certs from Let's Encrypt / Cloudflare / etc.
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Basic TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Static frontend ──────────────────────────────
    root /usr/share/nginx/html;
    index taskpane.html;

    # ── API reverse proxy ────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout matching the LLM call (OpenAI can be slow)
        proxy_read_timeout 60s;
    }

    # ── SPA fallback ─────────────────────────────────
    location / {
        try_files $uri $uri/ /taskpane.html;
    }

    # ── Cache static assets ──────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
