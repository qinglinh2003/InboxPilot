<!DOCTYPE html>
<html><head><title>MailPilot Icon Preview</title>
<style>
  body { font-family: system-ui; background: #1a1a2e; color: #fff;
         display: flex; flex-direction: column; align-items: center;
         padding: 40px; gap: 30px; }
  .row { display: flex; gap: 30px; align-items: center; }
  .icon-box { text-align: center; }
  .icon-box img { image-rendering: pixelated; border: 1px solid #333; }
  .label { font-size: 12px; color: #888; margin-top: 6px; }
  h1 { margin: 0; }
  .light { background: #f5f5f5; padding: 20px; border-radius: 12px; }
</style></head><body>
<h1>MailPilot Icons</h1>
<h3>Dark background (actual size)</h3>
<div class="row">
  <div class="icon-box"><img src="icon-16.png" width="16" height="16"><div class="label">16×16</div></div>
  <div class="icon-box"><img src="icon-32.png" width="32" height="32"><div class="label">32×32</div></div>
  <div class="icon-box"><img src="icon-64.png" width="64" height="64"><div class="label">64×64</div></div>
  <div class="icon-box"><img src="icon-80.png" width="80" height="80"><div class="label">80×80</div></div>
</div>
<h3>Dark background (4× zoom)</h3>
<div class="row">
  <div class="icon-box"><img src="icon-16.png" width="64" height="64"><div class="label">16×16 @ 4×</div></div>
  <div class="icon-box"><img src="icon-32.png" width="128" height="128"><div class="label">32×32 @ 4×</div></div>
  <div class="icon-box"><img src="icon-64.png" width="256" height="256"><div class="label">64×64 @ 4×</div></div>
  <div class="icon-box"><img src="icon-80.png" width="320" height="320"><div class="label">80×80 @ 4×</div></div>
</div>
<h3>Light background (4× zoom)</h3>
<div class="row light">
  <div class="icon-box"><img src="icon-16.png" width="64" height="64"><div class="label">16×16 @ 4×</div></div>
  <div class="icon-box"><img src="icon-32.png" width="128" height="128"><div class="label">32×32 @ 4×</div></div>
  <div class="icon-box"><img src="icon-64.png" width="256" height="256"><div class="label">64×64 @ 4×</div></div>
  <div class="icon-box"><img src="icon-80.png" width="320" height="320"><div class="label">80×80 @ 4×</div></div>
</div>
</body></html>
