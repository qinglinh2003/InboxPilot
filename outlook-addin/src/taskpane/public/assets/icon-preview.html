<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MailPilot Icon Preview</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    gap: 32px;
  }
  h1 { color: #7c9dff; margin-bottom: 8px; }
  .grid {
    display: flex;
    gap: 40px;
    align-items: end;
    flex-wrap: wrap;
    justify-content: center;
  }
  .icon-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: #252540;
    padding: 24px 20px 16px;
    border-radius: 12px;
  }
  .icon-card img { image-rendering: auto; }
  .label { font-size: 13px; color: #999; }
  .zoom-row {
    display: flex;
    gap: 24px;
    align-items: center;
    background: #252540;
    padding: 20px 32px;
    border-radius: 12px;
  }
  .zoom-row img { image-rendering: pixelated; }
  .section-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-top: 16px;
  }
  .bg-white { background: #fff; padding: 24px; border-radius: 12px; }
  .bg-dark  { background: #1a1a2e; padding: 24px; border-radius: 12px; }
</style>
</head>
<body>
  <h1>MailPilot Icons</h1>

  <p class="section-title">Actual Size</p>
  <div class="grid">
    <div class="icon-card">
      <img src="icon-16.png" width="16" height="16" alt="icon-16">
      <span class="label">16x16</span>
    </div>
    <div class="icon-card">
      <img src="icon-32.png" width="32" height="32" alt="icon-32">
      <span class="label">32x32</span>
    </div>
    <div class="icon-card">
      <img src="icon-64.png" width="64" height="64" alt="icon-64">
      <span class="label">64x64</span>
    </div>
    <div class="icon-card">
      <img src="icon-80.png" width="80" height="80" alt="icon-80">
      <span class="label">80x80</span>
    </div>
  </div>

  <p class="section-title">4x Zoom (on dark)</p>
  <div class="zoom-row bg-dark">
    <img src="icon-16.png" width="64" height="64" alt="icon-16 zoomed">
    <img src="icon-32.png" width="128" height="128" alt="icon-32 zoomed">
    <img src="icon-64.png" width="256" height="256" alt="icon-64 zoomed">
    <img src="icon-80.png" width="320" height="320" alt="icon-80 zoomed">
  </div>

  <p class="section-title">4x Zoom (on white)</p>
  <div class="zoom-row bg-white">
    <img src="icon-16.png" width="64" height="64" alt="icon-16 zoomed">
    <img src="icon-32.png" width="128" height="128" alt="icon-32 zoomed">
    <img src="icon-64.png" width="256" height="256" alt="icon-64 zoomed">
    <img src="icon-80.png" width="320" height="320" alt="icon-80 zoomed">
  </div>
</body>
</html>
