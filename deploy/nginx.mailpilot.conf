# MailPilot production nginx locations for qinglinh.com.
#
# Install inside the existing qinglinh.com TLS server block. The frontend
# location intentionally avoids X-Frame-Options and Content-Security-Policy
# frame-ancestors headers because Outlook hosts task panes in iframes, and
# some managed Microsoft 365 tenants fail closed when those headers are set.

location ^~ /mailpilot/api/ {
    proxy_pass http://127.0.0.1:8082/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location ^~ /mailpilot/ {
    alias /var/www/qinglinh.com/mailpilot/;
    try_files $uri $uri/ /mailpilot/index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
}
